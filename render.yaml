services:
  - type: web
    name: laravel-be
    env: docker
    plan: free
    region: singapore
    rootDir: BE
    dockerfilePath: Dockerfile
    autoDeploy: true
    envVars:
      - fromGroup: LongKeChat

  - type: web
    name: laravel-fe
    env: static
    rootDir: FE/vue-app
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - fromGroup: LongKeChat-FE
    routes:
      # 1. Chuyển hướng âm thầm mọi request /api sang Backend
      - type: rewrite
        source: /api/*
        destination: https://laravel-be.onrender.com/api/*
      
      # 2. Chuyển hướng âm thầm mọi request /sanctum sang Backend
      - type: rewrite
        source: /sanctum/*
        destination: https://laravel-be.onrender.com/sanctum/*
        
      # 3. Luật dành cho Vue Router (Phải để cuối cùng)
      - type: rewrite
        source: /*
        destination: /index.html