services:
  - type: web
    name: laravel-be
    env: docker
    plan: free
    dockerfilePath: BE/Dockerfile
    dockerContext: .
    autoDeploy: true

  - type: worker
    name: laravel-queue
    env: docker
    plan: free
    dockerfilePath: BE/Dockerfile
    dockerContext: .
    dockerCommand: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    autoDeploy: true
